<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierheim-Check-in</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body>
    <main class="page">
        <h1>Tierheim-Check-in</h1>
        <div class="controls">
            <input id="name-input" type="text" placeholder="Tiername">
            <button id="add-btn" type="button">Einchecken</button>
            <button id="remove-btn" type="button">Erstes Tier vermitteln</button>
        </div>
        <p id="status">Noch kein Tier eingecheckt.</p>
        <ul id="tier-list"></ul>
    </main>
</body>

</html>
